name: wepei_module
description: WePeiYang Flutter module for HarmonyOS

version: 4.5.3+183

environment:
  sdk: ">=3.6.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  miui_long_screenshot: ^0.1.0
  async: ^2.8.2
  numberpicker: ^2.1.2
  pointycastle: ^3.1.1
  xml: ^6.5.0
  syncfusion_flutter_barcodes: ^25.1.42
  badges: ^3.1.1
  connectivity_plus: ^5.0.2
  cached_network_image: ^3.4.0
  card_swiper: ^3.0.1
  dio: ^5.4.1
  dio_smart_retry: ^6.0.0
  dio_cookie_caching_handler:
    path: ./lib/commons/network/dio_cookie_cached_handler
  record: ^4.4.4
  extended_tabs: ^4.1.0
  extended_image: any
  shimmer: ^3.0.0
  flutter_displaymode: ^0.6.0
  flutter_html:
    git:
      url: https://github.com/Sub6Resources/flutter_html.git
      ref: 79ec194fa6690e5caba58f5eca04e6748394bb6b
  flutter_markdown: ^0.6.22
  flutter_rating_bar: ^4.0.1
  flutter_native_image: ^0.0.6+1
  flutter_screenutil: ^5.9.0
  flutter_smart_dialog: ^4.9.8+2
  flutter_svg: ^2.0.10
  fluttertoast: ^8.2.4
  gallery_saver:
    git:
      url: https://github.com/hxphieno/gallery_saver.git
  http_parser: ^4.0.2
  glass_kit: any
  frosted_glass_effect: any
  image_cropper: ^1.5.0
  image_picker: ^1.0.7
  like_button: ^2.0.5
  linkfy_text:
    git:
      url: https://github.com/Iamstanlee/linkfy_text.git
  mutex: ^3.1.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  photo_view: ^0.14.0
  provider: ^6.1.2
  pull_to_refresh: ^2.0.0
  retry: ^3.1.2
  flutter_reorderable_grid_view: ^4.0.0
  screenshot: ^3.0.0
  share_plus: ^8.0.2
  shared_preferences: ^2.2.2
  simple_html_css: ^5.0.0
  simple_url_preview_v2:
    git:
      url: https://github.com/hxphieno/flutter-simple-url-preview_2.git
  flutter_link_previewer: ^3.2.2
  table_calendar: ^3.0.9
  url_launcher: ^6.2.5
  uuid: ^4.3.3
  webview_flutter: ^2.0.13
  wechat_picker_library: 1.0.7
  wechat_assets_picker: ^10.1.2
  window_manager: ^0.3.8
  waterfall_flow: ^3.0.3
  image_size_getter: ^2.1.2
  flutter_staggered_grid_view: ^0.4.0
  transparent_image: ^2.0.1
  package_info_plus: ^6.0.0
  glass: any
  qr_code_tools:
    git:
      url: https://github.com/Abobo7/qr_code_tools.git

  cupertino_icons: ^1.0.8
  dio_cookie_manager: ^3.4.0
  cookie_jar: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.1.2

dependency_overrides:
  photo_manager: 3.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/images/ai/
    - assets/images/calender/
    - assets/images/school_map/
    - assets/images/account/
    - assets/images/account/1.5x/
    - assets/images/account/2.0x/
    - assets/images/account/3.0x/
    - assets/images/account/4.0x/
    - assets/images/schedule/
    - assets/images/studyroom_icons/
    - assets/images/lake_butt_icons/
    - assets/images/lost_and_found_icons/
    - assets/svg_pics/
    - assets/svg_pics/ai_icons/
    - assets/svg_pics/lake_butt_icons/
    - assets/svg_pics/laf_butt_icons/
    - privacy/

  fonts:
    - family: Fourche
      fonts:
        - asset: assets/fonts/en/SFFourcheBoldItalic.ttf
          style: italic

    - family: Swis
      fonts:
        - asset: assets/fonts/en/Swis721-Blk-BT-Black-2.ttf

    - family: ProductSans
      fonts:
        - asset: assets/fonts/en/ProductSans-Bold.ttf
        - asset: assets/fonts/en/ProductSans-Regular.ttf
  module:
    androidX: true
    androidPackage: com.twtservice.wepeiyang
    iosBundleIdentifier: com.twtservice.wepeiyang
    ohosBundleName: com.twtservice.wepeiyang

